#__localhost__

# ===============================
# Application
# ===============================
app.base-url=http://localhost:8080
app.company.name=SamayaHR
app.admin.email=santoshmyrohit@gmail.com

# ===============================
# Database Configuration - MySQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/samayadb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# File Upload (multipart)
# ===============================
spring.servlet.multipart.enabled=true
file.upload-dir=./uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=50MB

# ===============================
# \u2705 FIX for 500 on POST /api/hr-documents/{id}/sign
#
# Problem: signature drawn on canvas is sent as base64 PNG (~80-200KB)
# in the JSON request body. Spring Boot's Tomcat connector has a default
# max POST size of 2MB (2,097,152 bytes) for application/json bodies.
# The request was being rejected by Tomcat BEFORE reaching the controller,
# returning Spring's generic {"status":500,"error":"Internal Server Error"}
# instead of our custom ApiResponse \u2014 that's why the error had no message.
#
# Fix: increase Tomcat's max body size to 50MB.
# This also fixes multipart file uploads for HR documents.
# ===============================
server.tomcat.max-http-form-post-size=52428800
server.tomcat.max-swallow-size=52428800

# ===============================
# JWT
# ===============================
jwt.secret=your-secret-key-change-this-in-production-minimum-256-bits
jwt.expiration=86400000

# ===============================
# CORS
# ===============================
# Comma-separated list of allowed origins. Override via CORS_ALLOWED_ORIGINS env var in production.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ===============================
# WebSocket
# ===============================
websocket.allowed-origins=http://localhost:3000,http://localhost:5173

# ===============================
# Logging
# ===============================
logging.level.root=INFO
logging.level.com.hrms=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=WARN

